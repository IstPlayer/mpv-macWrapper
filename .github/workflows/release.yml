name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and package
        run: make release

      - name: Rename DMG for release
        run: mv mpv-*.dmg mpv.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: mpv.dmg
          generate_release_notes: true
